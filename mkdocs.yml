site_name: Wits MedWiki
site_description: Clinical knowledge base for Wits medical students, interns, and junior doctors
site_author: Wits Faculty of Health Sciences
site_url: https://your-username.github.io/wits-medwiki/

repo_name: wits-medwiki
repo_url: https://github.com/your-username/wits-medwiki
edit_uri: edit/main/docs/

copyright: >
  © Wits Faculty of Health Sciences &nbsp;|&nbsp;
  For educational use only — verify against current guidelines before clinical application

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.prune
    - search.suggest
    - search.highlight
    - search.share
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.tabs.link
    - toc.follow
    - toc.integrate

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

plugins:
  - search:
      lang: en
  - tags:
      tags_file: tags.md
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      title: On this page

extra:
  social:
    - icon: fontawesome/solid/hospital
      link: https://www.wits.ac.za/health/
      name: Wits Health Sciences
  tags:
    # Body Systems
    Cardiovascular: system
    Respiratory: system
    Neurological: system
    Gastrointestinal: system
    Renal: system
    Haematological: system
    Endocrine: system
    Musculoskeletal: system
    # Illness types
    Infection: illness
    Trauma: illness
    Malignancy: illness
    Metabolic: illness
    # Drugs
    Antibiotic: drug
    Analgesic: drug
    Insulin: drug
    Anticoagulant: drug
    # Framework
    Wits-Protocol: framework
    Clinical-Skill: framework
    Exam-Prep: framework
    Guideline: framework
    Procedure: framework

